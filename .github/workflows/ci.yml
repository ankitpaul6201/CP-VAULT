name: CI — Build & Validate

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-extension:
    name: Build Extension
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: extension/package-lock.json

      - name: Install Extension Dependencies
        run: |
          cd extension
          npm ci

      - name: Build Extension
        run: |
          cd extension
          npm run build

      - name: Upload Extension Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cp-vault-extension-dist
          path: extension/dist/
          retention-days: 7

  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install Backend Dependencies
        run: |
          cd backend
          npm ci

      - name: Validate Backend Entry Point
        run: |
          cd backend
          node --check server.js

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    # Informational only — does not block PRs
    continue-on-error: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Audit Extension Dependencies
        working-directory: extension
        run: npm audit --audit-level=critical --omit=dev || true

      - name: Audit Backend Dependencies
        working-directory: backend
        run: npm audit --audit-level=critical --omit=dev || true
