name: CI — Build & Validate

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-extension:
    name: Build Extension
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: extension/package-lock.json

      - name: Install Extension Dependencies
        run: |
          cd extension
          npm ci

      - name: Build Extension
        run: |
          cd extension
          npm run build

      - name: Upload Extension Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cp-vault-extension-dist
          path: extension/dist/
          retention-days: 7

  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install Backend Dependencies
        run: |
          cd backend
          npm ci

      - name: Validate Backend Starts
        run: |
          cd backend
          echo "GITHUB_CLIENT_ID=test" > .env
          echo "GITHUB_CLIENT_SECRET=test" >> .env
          echo "PORT=3000" >> .env
          timeout 5 node server.js || [ $? -eq 124 ] && echo "Server started successfully"

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Audit Extension Dependencies
        run: |
          cd extension
          npm audit --audit-level=high

      - name: Audit Backend Dependencies
        run: |
          cd backend
          npm audit --audit-level=high

      - name: Check for Secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified
