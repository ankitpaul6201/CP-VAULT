name: CP Vault CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-key: '20'

    - name: Install Extension Dependencies
      run: |
        cd extension
        npm ci

    - name: Build Extension
      run: |
        cd extension
        npm run build

    - name: Install Backend Dependencies
      run: |
        cd backend
        npm ci
