name: Bug Report
description: Report a bug or unexpected behavior in CP Vault
title: "[Bug]: "
labels: ["bug", "needs-triage"]
assignees: ["ankitpaul6201"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the form below as completely as possible.

  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      description: Please verify these before submitting a bug report.
      options:
        - label: I have searched existing issues and this is not a duplicate
          required: true
        - label: I am using the latest version of CP Vault
          required: true

  - type: dropdown
    id: platform
    attributes:
      label: Affected Platform
      description: Which competitive programming platform were you using?
      options:
        - LeetCode
        - Codeforces
        - CodeChef
        - HackerRank
        - Multiple Platforms
        - Not Platform Specific
    validations:
      required: true

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Google Chrome
        - Microsoft Edge
        - Brave
        - Opera
        - Other Chromium-based
    validations:
      required: true

  - type: input
    id: browser-version
    attributes:
      label: Browser Version
      placeholder: "e.g., 126.0.6478.127"
    validations:
      required: true

  - type: input
    id: extension-version
    attributes:
      label: CP Vault Version
      description: Found in chrome://extensions/ next to CP Vault
      placeholder: "e.g., 1.0.0"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: "When I submit an accepted solution on LeetCode, the extension..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the behavior
      placeholder: |
        1. Navigate to LeetCode problem XYZ
        2. Submit an accepted solution in Python
        3. Wait 10 seconds
        4. Notice that...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      placeholder: "The extension should sync the solution and show a success notification."
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      placeholder: "Nothing happens. No notification appears."
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Console Logs
      description: |
        Please paste relevant console logs. To get them:
        1. Open chrome://extensions/
        2. Find CP Vault → click "Service Worker"
        3. Copy logs from the Console tab
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Screenshots, recordings, or any other relevant information
